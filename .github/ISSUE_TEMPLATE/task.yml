name: Engineering task
description: Create a scoped technical task.
labels: [task]
body:
  - type: input
    id: area
    attributes:
      label: Area
      description: fuzzer, generator, web, ci, docs, or ops
    validations:
      required: true
  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      options:
        - trivial
        - medium
        - high
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Task summary
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete completion checks.
    validations:
      required: true
